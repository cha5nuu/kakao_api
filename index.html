<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학로 주변 추천 서비스</title>
    <style>
        /* 기본 여백 초기화 및 화면 전체 크기 사용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 왼쪽(검색/카테고리)과 오른쪽(지도)을 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 패널 스타일 (전체 테마: 시원한 하늘색) */
        .search-panel {
            width: 380px; 
            height: 100%;
            background-color: #f0f7fc;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #bae0f5;
            z-index: 10; 
        }

        /* 키워드 검색창 영역 */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #94ccf0;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: 2px solid #3498db;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #3498db; 
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background-color: #217dbb;
        }

        /* 카테고리 탭 스타일 */
        .tab-group {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            padding: 12px 0;
            background-color: #e1f0fa;
            border: 1px solid #94ccf0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-button.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        .tab-button:hover:not(.active) {
            background-color: #cfe6f5;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .result-item {
            padding: 15px;
            background-color: white;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #bae0f5;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-item:hover {
            background-color: #ebf5fc;
        }

        .result-item h5 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .result-item p {
            font-size: 13px;
            color: #7f8c8d;
        }

        /* 오른쪽 지도 영역 스타일 */
        .map-area {
            flex: 1; 
            height: 100%;
            background-color: #eef3f7; /* 지도가 로드되기 전 비치는 배경색 */
        }

        /* 인포윈도우 커스텀 스타일 */
        .info-window-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .info-window-content a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 검색, 카테고리 탭, 결과 리스트 -->
        <div class="search-panel">
            <!-- 키워드 검색 -->
            <div class="search-box">
                <input type="text" id="keyword" placeholder="대학로 맛집, 낙산공원 등 입력">
                <button onclick="searchByKeyword()">검색</button>
            </div>

            <!-- 카테고리 추천 탭 -->
            <div class="tab-group">
                <button id="tabFood" class="tab-button" onclick="changeTab('FD6', 'tabFood')">🍕 뭐 먹지?</button>
                <button id="tabCafe" class="tab-button" onclick="changeTab('CE7', 'tabCafe')">☕ 뭐 마시지?</button>
                <button id="tabActivity" class="tab-button" onclick="changeTab('MULTI', 'tabActivity')">🎭 뭐 하지?</button>
            </div>

            <!-- 결과 출력 리스트 -->
            <ul id="placesList" class="result-list"></ul>
        </div>

        <!-- 오른쪽: 지도 표시 -->
        <div id="map" class="map-area"></div>
    </div>

    <!-- 카카오 JavaScript API (동기식 로드를 위해 autoload=false 제거) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8e63724a5ae060891596d0d2cc915fc3&libraries=services"></script>
    <script>
        // 대학로 혜화 마로니에 공원 좌표 고정
        const daehakroCenter = new kakao.maps.LatLng(37.581787, 127.002621);
        
        const mapContainer = document.getElementById('map'); 
        const mapOption = {
            center: daehakroCenter, // 기본 중심 좌표 (혜화 마로니에 공원)
            level: 3 // 대학로 주변이 조밀하게 잘 보이도록 확대 레벨 3으로 설정
        };

        // 지도 객체 생성
        const map = new kakao.maps.Map(mapContainer, mapOption);
        
        // 장소 검색 서비스 및 인포윈도우 객체 생성
        const placeService = new kakao.maps.services.Places();
        const infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });
        
        let markers = []; 

        // 지도에 확대/축소 컨트롤 추가
        const zoomControl = new kakao.maps.ZoomControl();
        map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHTTOP);

        // 지도 자체를 클릭하면 열려있던 상세 팝업창(인포윈도우) 닫기
        kakao.maps.event.addListener(map, 'click', function() {
            infoWindow.close();
        });

        // 웹 페이지가 열리자마자 자동으로 '뭐 먹지?(FD6)' 카테고리 첫 검색 실행
        changeTab('FD6', 'tabFood');

        // 탭 변경 및 카테고리 검색 기능
        function changeTab(categoryCode, tabId) {
            // 탭 디자인 활성화 상태 변경
            const tabs = document.querySelectorAll('.tab-button');
            tabs.forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 카테고리 서칭 시 혼선을 주지 않기 위해 검색창 비우기
            document.getElementById('keyword').value = '';

            // 기존 마커 및 팝업 지우기
            removeMarkers();
            infoWindow.close();

            // '뭐 하지?' 탭일 때 (CT1 문화시설 + AT4 관광명소 병렬 검색)
            if (categoryCode === 'MULTI') {
                searchMultiCategories(['CT1', 'AT4']);
            } else {
                // 일반 단일 카테고리 검색 (마로니에 공원 기준 반경 1km 내 설정)
                placeService.categorySearch(categoryCode, placesSearchCB, {
                    location: daehakroCenter,
                    radius: 1000
                });
            }
        }

        // 문화시설(CT1)과 관광명소(AT4) 데이터를 동시에 받아오기 위한 병렬 처리 함수
        function searchMultiCategories(categories) {
            let combinedData = [];
            let completedRequests = 0;

            categories.forEach(category => {
                placeService.categorySearch(category, function(data, status) {
                    completedRequests++;
                    
                    if (status === kakao.maps.services.Status.OK) {
                        combinedData = combinedData.concat(data);
                    }

                    // 지정한 두 카테고리 요청이 모두 완료되었을 때 한 번에 화면에 노출
                    if (completedRequests === categories.length) {
                        if (combinedData.length > 0) {
                            displayPlaces(combinedData);
                        } else {
                            clearListAndShowMessage('주변에 추천할 장소가 없습니다.');
                        }
                    }
                }, {
                    location: daehakroCenter,
                    radius: 1000
                });
            });
        }

        // 상단 키워드 검색 함수
        function searchByKeyword() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                alert('검색어를 입력해주세요!');
                return;
            }

            // 키워드 검색 모드로 갈 때는 아래 카테고리 탭 활성화 모두 해제
            const tabs = document.querySelectorAll('.tab-button');
            tabs.forEach(tab => tab.classList.remove('active'));

            infoWindow.close();
            
            // 대학로 주변 탐색이 명확해지도록 검색어 뒤에 자동으로 '대학로' 추가 가공 및 중심점 타겟팅
            placeService.keywordSearch(keyword + ' 대학로', placesSearchCB, {
                location: daehakroCenter,
                radius: 2000
            });
        }

        // 장소 데이터 수신 검증 콜백
        function placesSearchCB(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                clearListAndShowMessage('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('데이터를 가져오는 중 오류가 발생했습니다.');
            }
        }

        // 받아온 데이터를 바탕으로 지도 마커와 리스트를 그리는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            listEl.innerHTML = '';
            removeMarkers();

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 마커 객체 생성 후 지도 매핑
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker); 

                // 마커 찍힌 곳 클릭 시 상세 팝업 오픈 이벤트 주입
                kakao.maps.event.addListener(marker, 'click', function() {
                    displayInfoWindow(marker, places[i]);
                });

                // 사이드바 리스트 엘리먼트 생성
                const itemEl = document.createElement('li');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;
                
                // 리스트 아이템 클릭 시에도 해당 마커 정보창을 열고 지도를 그쪽으로 부드럽게 이동(panTo)
                itemEl.onclick = function() {
                    displayInfoWindow(marker, places[i]);
                    map.panTo(placePosition);
                };
                
                bounds.extend(placePosition);
                listEl.appendChild(itemEl);
            }

            // 마커들이 균형 있게 화면에 다 들어오도록 지도 좌표계 자동 조정
            map.setBounds(bounds);
        }

        // 장소 상세 인포윈도우 구성 함수
        function displayInfoWindow(marker, place) {
            const lastCategory = place.category_name.split(' > ').pop(); // 대분류 제외 최종 카테고리만 추출
            const content = `
                <div class="info-window-content">
                    <strong>${place.place_name}</strong><br>
                    <span style="color:#888; font-size:11px;">${lastCategory}</span><br>
                    <a href="${place.place_url}" target="_blank">상세보기 ↗</a>
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        }

        // 화면 내 모든 마커 초기화
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }   
            markers = [];
        }

        // 검색 데이터 부재 시 알림 문구를 출력해주는 함수
        function clearListAndShowMessage(message) {
            const listEl = document.getElementById('placesList');
            listEl.innerHTML = `<li style="padding: 30px; text-align: center; color: #7f8c8d; font-size: 14px;">${message}</li>`;
            removeMarkers();
        }
    </script>
</body>
</html>
