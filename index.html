<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 카카오맵 검색 서비스</title>
    <style>
        /* 기본 여백 초기화 및 화면 전체 크기 사용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 왼쪽(검색)과 오른쪽(지도)을 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 검색 영역 스타일 */
        .search-panel {
            width: 350px; 
            height: 100%;
            background-color: #f7f7f7;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10; 
        }

        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #fee500; 
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background-color: #fada0a;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .result-item {
            padding: 15px;
            background-color: white;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }

        .result-item h5 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .result-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 스타일 */
        .map-area {
            flex: 1; 
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 검색 및 결과창 -->
        <div class="search-panel">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요 (예: 홍대맛집)">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="placesList" class="result-list"></ul>
        </div>

        <!-- 오른쪽: 지도 표시 -->
        <div id="map" class="map-area"></div>
    </div>

    <!-- 새로운 카카오 JavaScript 키가 반영된 스크립트 (autoload=false) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8e63724a5ae060891596d0d2cc915fc3&libraries=services&autoload=false"></script>
    <script>
        let map;
        let ps;
        let markers = []; 

        // 지도가 안전하게 로드된 후에 실행
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 중심 좌표 (서울시청)
                level: 5 // 지도 확대 레벨 5
            };

            // 지도 및 장소 검색 객체 생성
            map = new kakao.maps.Map(mapContainer, mapOption);
            ps = new kakao.maps.services.Places();

            // 위치 권한을 요청하여 현재 위치를 중심으로 지도 설정
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  
                    const lon = position.coords.longitude; 
                    const locPosition = new kakao.maps.LatLng(lat, lon); 
                    
                    map.setCenter(locPosition);
                    
                    // 현재 위치 마커 표시
                    const currentMarker = new kakao.maps.Marker({
                        position: locPosition,
                        map: map
                    });
                    
                }, function(error) {
                    console.log("위치 권한을 허용하지 않았거나 오류가 발생했습니다.", error);
                });
            }
        });

        // 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색 완료 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 목록과 마커 표출 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            listEl.innerHTML = '';
            removeMarker();

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker); 

                const itemEl = document.createElement('li');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;
                
                bounds.extend(placePosition);
                listEl.appendChild(itemEl);
            }

            // 검색된 장소들이 모두 보이도록 지도 시점 조절
            map.setBounds(bounds);
        }

        // 마커 제거 함수
        function removeMarker() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }   
            markers = [];
        }
    </script>
</body>
</html>
