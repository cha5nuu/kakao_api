<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학로 주변 추천 서비스</title>
    <style>
        /* 기본 여백 초기화 및 화면 전체 크기 사용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 왼쪽(검색)과 오른쪽(지도)을 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 검색 영역 스타일 */
        .search-panel {
            width: 350px; 
            height: 100%;
            background-color: #f8fafc; /* 연한 하늘빛이 도는 미색 바탕 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e2e8f0;
            z-index: 10; 
        }

        /* 서비스 메인 제목 스타일 (하늘색 테마 포인트) */
        .service-title {
            font-size: 22px;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            border-bottom: 3px solid #38bdf8; /* 청량한 스카이 블루 하이라이트 */
            padding-bottom: 8px;
        }

        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #38bdf8; /* 검색창 클릭 시 하늘색 테두리 */
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #0284c7; /* 짙은 하늘색 버튼 */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .search-box button:hover {
            background-color: #0369a1; /* 마우스 올렸을 때 더 짙은 블루 */
        }

        /* 카테고리 탭 스타일 */
        .tab-container {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-button {
            flex: 1;
            padding: 10px;
            background-color: #e2e8f0;
            color: #64748b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        /* 활성화된 탭 스타일 (하늘색 테마) */
        .tab-button.active {
            background-color: #38bdf8;
            color: white;
        }

        .tab-button:hover {
            background-color: #cbd5e1;
        }
        .tab-button.active:hover {
            background-color: #0ea5e9;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .result-item {
            padding: 15px;
            background-color: white;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-item:hover {
            background-color: #f0f9ff; /* 리스트 올렸을 때 은은한 하늘색 */
            border-color: #bae6fd;
        }

        .result-item h5 {
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .result-item p {
            font-size: 13px;
            color: #64748b;
        }

        /* 오른쪽 지도 영역 스타일 */
        .map-area {
            flex: 1; 
            height: 100%;
        }

        /* 인포윈도우 커스텀 스타일 */
        .info-window-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            color: #333;
        }
        .info-window-content strong {
            display: block;
            font-size: 14px;
            margin-bottom: 3px;
            color: #0284c7; /* 팝업 텍스트 제목도 하늘색 포인트 */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 제목, 검색 및 결과창 -->
        <div class="search-panel">
            <!-- 서비스 대제목 -->
            <h1 class="service-title">대학로 주변 추천 서비스</h1>

            <!-- 키워드 검색창 -->
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요 (예: 혜화역 맛집)">
                <button onclick="searchPlaces()">검색</button>
            </div>

            <!-- 추천 카테고리 탭 -->
            <div class="tab-container">
                <button id="defaultTab" class="tab-button" onclick="selectTab('FD6', this)">뭐 먹지?</button>
                <button class="tab-button" onclick="selectTab('CE7', this)">뭐 마시지?</button>
                <button class="tab-button" onclick="selectTab('COMPLEX', this)">뭐 하지?</button>
            </div>

            <ul id="placesList" class="result-list"></ul>
        </div>

        <!-- 오른쪽: 지도 표시 -->
        <div id="map" class="map-area"></div>
    </div>

    <!-- 새로운 카카오 JavaScript 키가 반영된 스크립트 (autoload=false) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8e63724a5ae060891596d0d2cc915fc3&libraries=services&autoload=false"></script>
    <script>
        let map;
        let ps;
        let markers = []; 
        let infoWindow; // 상세 팝업을 위한 인포윈도우 객체
        
        // 대학로 마로니에공원/혜화역 기준의 고정 중심 좌표값
        const daehangnoPosition = new kakao.maps.LatLng(37.5821, 127.0018);

        // 지도가 안전하게 로드된 후에 실행
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = {
                center: daehangnoPosition, // 초기 중심 위치를 대학로로 설정
                level: 4 // 대학로 상권이 가장 잘 보이는 확대 레벨
            };

            // 지도 및 장소 검색 객체 생성
            map = new kakao.maps.Map(mapContainer, mapOption);
            ps = new kakao.maps.services.Places();
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 지도 확대/축소 컨트롤 추가
            const zoomControl = new kakao.maps.ZoomControl();
            map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHTTOP);
            
            // 앱이 켜지자마자 첫 번째 탭('뭐 먹지?')을 자동으로 실행시켜 대학로 주변을 즉시 탐색합니다.
            const defaultTabBtn = document.getElementById('defaultTab');
            selectTab('FD6', defaultTabBtn);
        });

        // 탭 선택 및 카테고리 검색 기능
        function selectTab(categoryCode, element) {
            // 모든 탭의 active 클래스 제거 후 클릭된 탭에 추가
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 검색창 비우기 (카테고리 검색 집중을 위함)
            document.getElementById('keyword').value = '';

            // 기존 마커, 리스트, 팝업 지우기
            removeMarker();
            infoWindow.close();
            document.getElementById('placesList').innerHTML = '';

            // 현재 지도의 중심점을 가져옴
            const currentCenter = map.getCenter(); 

            if (categoryCode === 'COMPLEX') {
                let combinedData = [];
                let completedRequests = 0;

                const handleComplexResult = (data, status) => {
                    completedRequests++;
                    if (status === kakao.maps.services.Status.OK) {
                        combinedData = combinedData.concat(data);
                    }
                    
                    if (completedRequests === 2) {
                        if (combinedData.length > 0) {
                            displayPlaces(combinedData, false); // 카테고리 검색은 시점 고정
                        } else {
                            alert('주변에 문화시설이나 관광명소가 없습니다.');
                        }
                    }
                };

                // 문화시설(CT1) 및 관광명소(AT4) 반경 1km 이내 검색
                ps.categorySearch('CT1', function(data, status) {
                    handleComplexResult(data, status);
                }, { location: currentCenter, radius: 1000 });

                ps.categorySearch('AT4', function(data, status) {
                    handleComplexResult(data, status);
                }, { location: currentCenter, radius: 1000 });

            } else {
                // 일반 카테고리(음식점, 카페) 반경 1km 이내 검색
                ps.categorySearch(categoryCode, function(data, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        displayPlaces(data, false); // 대학로 시점이 튕기지 않게 고정
                    }
                }, {
                    location: currentCenter,
                    radius: 1000
                });
            }
        }

        // 키워드 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));

            infoWindow.close();
            
            ps.keywordSearch(keyword, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    displayPlaces(data, true); 
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('검색 결과가 존재하지 않습니다.');
                }
            }); 
        }

        // 검색 결과 목록과 마커 표출 함수
        function displayPlaces(places, shouldMoveBounds) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            listEl.innerHTML = '';
            removeMarker();

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker); 

                const itemEl = document.createElement('li');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;
                
                kakao.maps.event.addListener(marker, 'click', function() {
                    showInfoWindow(marker, places[i]);
                });

                itemEl.onclick = function() {
                    map.panTo(placePosition);
                    showInfoWindow(marker, places[i]);
                };
                
                bounds.extend(placePosition);
                listEl.appendChild(itemEl);
            }

            if (shouldMoveBounds) {
                map.setBounds(bounds);
            }
        }

        // 상세 팝업(인포윈도우) 표시 함수
        function showInfoWindow(marker, place) {
            const content = `
                <div class="info-window-content">
                    <strong>${place.place_name}</strong>
                    <span>${place.road_address_name ? place.road_address_name : place.address_name}</span><br>
                    ${place.phone ? `<small style="color:#888;">${place.phone}</small>` : ''}
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        }

        // 마커 제거 함수
        function removeMarker() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }   
            markers = [];
        }
    </script>
</body>
</html>
